<svg xmlns="http://www.w3.org/2000/svg" width="950" height="500" viewBox="0 0 950 500" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">2. Group Messaging</text>

  <g>
    <circle cx="80" cy="240" r="14" class="actor-line"/>
    <line x1="80" y1="254" x2="80" y2="295" class="actor-line"/>
    <line x1="55" y1="270" x2="105" y2="270" class="actor-line"/>
    <line x1="80" y1="295" x2="55" y2="330" class="actor-line"/>
    <line x1="80" y1="295" x2="105" y2="330" class="actor-line"/>
    <text x="80" y="352" class="actor-label">Group Member</text>
  </g>

  <rect x="220" y="60" width="700" height="400" rx="8" class="boundary"/>
  <text x="570" y="82" class="boundary-title">Group Chat Service</text>

  <ellipse cx="400" cy="150" rx="135" ry="28" class="usecase"/>
  <text x="400" y="146" class="uc-label">Send Group Message</text>
  <text x="400" y="162" class="stereo">(WebSocket)</text>

  <ellipse cx="730" cy="150" rx="155" ry="28" class="usecase"/>
  <text x="730" y="154" class="uc-label">Fetch Group Messages</text>

  <ellipse cx="400" cy="320" rx="135" ry="28" class="usecase"/>
  <text x="400" y="324" class="uc-label">Edit Group Message</text>

  <ellipse cx="730" cy="320" rx="135" ry="28" class="usecase"/>
  <text x="730" y="324" class="uc-label">Delete Group Message</text>

  <line x1="100" y1="280" x2="270" y2="155" class="assoc"/>
  <line x1="100" y1="280" x2="580" y2="155" class="assoc"/>
  <line x1="100" y1="280" x2="270" y2="320" class="assoc"/>
  <line x1="100" y1="280" x2="600" y2="320" class="assoc"/>
</svg>
