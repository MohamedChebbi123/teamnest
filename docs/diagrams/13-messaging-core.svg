<svg xmlns="http://www.w3.org/2000/svg" width="950" height="600" viewBox="0 0 950 600" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">1. Messaging Core</text>

  <g>
    <circle cx="80" cy="290" r="14" class="actor-line"/>
    <line x1="80" y1="304" x2="80" y2="345" class="actor-line"/>
    <line x1="55" y1="320" x2="105" y2="320" class="actor-line"/>
    <line x1="80" y1="345" x2="55" y2="380" class="actor-line"/>
    <line x1="80" y1="345" x2="105" y2="380" class="actor-line"/>
    <text x="80" y="402" class="actor-label">Channel Member</text>
  </g>

  <rect x="220" y="60" width="700" height="510" rx="8" class="boundary"/>
  <text x="570" y="82" class="boundary-title">Message Service</text>

  <ellipse cx="400" cy="140" rx="135" ry="28" class="usecase"/>
  <text x="400" y="136" class="uc-label">Send Message</text>
  <text x="400" y="152" class="stereo">(real-time WebSocket)</text>

  <ellipse cx="730" cy="140" rx="130" ry="28" class="usecase"/>
  <text x="730" y="144" class="uc-label">Send File in Channel</text>

  <ellipse cx="400" cy="270" rx="115" ry="26" class="usecase"/>
  <text x="400" y="274" class="uc-label">Edit Message</text>

  <ellipse cx="730" cy="270" rx="115" ry="26" class="usecase"/>
  <text x="730" y="274" class="uc-label">Delete Message</text>

  <ellipse cx="400" cy="400" rx="155" ry="28" class="usecase"/>
  <text x="400" y="396" class="uc-label">Fetch Channel Messages</text>
  <text x="400" y="412" class="stereo">(paginated)</text>

  <ellipse cx="730" cy="400" rx="155" ry="28" class="usecase"/>
  <text x="730" y="404" class="uc-label">Search Messages in Channel</text>

  <line x1="100" y1="330" x2="270" y2="148" class="assoc"/>
  <line x1="100" y1="330" x2="605" y2="148" class="assoc"/>
  <line x1="100" y1="330" x2="290" y2="275" class="assoc"/>
  <line x1="100" y1="330" x2="615" y2="275" class="assoc"/>
  <line x1="100" y1="330" x2="250" y2="400" class="assoc"/>
  <line x1="100" y1="330" x2="580" y2="400" class="assoc"/>

  <line x1="535" y1="140" x2="600" y2="140" class="dep"/>
  <text x="567" y="132" class="stereo">«extend»</text>
</svg>
