<svg xmlns="http://www.w3.org/2000/svg" width="950" height="600" viewBox="0 0 950 600" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">1. Group Chat Management</text>

  <g>
    <circle cx="80" cy="180" r="14" class="actor-line"/>
    <line x1="80" y1="194" x2="80" y2="235" class="actor-line"/>
    <line x1="55" y1="210" x2="105" y2="210" class="actor-line"/>
    <line x1="80" y1="235" x2="55" y2="270" class="actor-line"/>
    <line x1="80" y1="235" x2="105" y2="270" class="actor-line"/>
    <text x="80" y="292" class="actor-label">Group Creator/Admin</text>
  </g>

  <g>
    <circle cx="80" cy="450" r="14" class="actor-line"/>
    <line x1="80" y1="464" x2="80" y2="505" class="actor-line"/>
    <line x1="55" y1="480" x2="105" y2="480" class="actor-line"/>
    <line x1="80" y1="505" x2="55" y2="540" class="actor-line"/>
    <line x1="80" y1="505" x2="105" y2="540" class="actor-line"/>
    <text x="80" y="562" class="actor-label">Group Member</text>
  </g>

  <rect x="220" y="60" width="700" height="510" rx="8" class="boundary"/>
  <text x="570" y="82" class="boundary-title">Group Chat Service</text>

  <ellipse cx="400" cy="140" rx="125" ry="26" class="usecase"/>
  <text x="400" y="144" class="uc-label">Create Group Chat</text>

  <ellipse cx="730" cy="140" rx="125" ry="26" class="usecase"/>
  <text x="730" y="144" class="uc-label">Edit Group Chat</text>

  <ellipse cx="400" cy="270" rx="125" ry="26" class="usecase"/>
  <text x="400" y="274" class="uc-label">Delete Group Chat</text>

  <ellipse cx="730" cy="270" rx="155" ry="28" class="usecase"/>
  <text x="730" y="274" class="uc-label">Add Members to Group</text>

  <ellipse cx="400" cy="410" rx="155" ry="28" class="usecase"/>
  <text x="400" y="406" class="uc-label">View Eligible Friends</text>
  <text x="400" y="422" class="stereo">(to add)</text>

  <ellipse cx="730" cy="410" rx="145" ry="28" class="usecase"/>
  <text x="730" y="414" class="uc-label">View My Group Chats</text>

  <line x1="100" y1="220" x2="285" y2="148" class="assoc"/>
  <line x1="100" y1="220" x2="615" y2="148" class="assoc"/>
  <line x1="100" y1="220" x2="285" y2="275" class="assoc"/>
  <line x1="100" y1="220" x2="585" y2="275" class="assoc"/>
  <line x1="100" y1="220" x2="260" y2="408" class="assoc"/>

  <line x1="100" y1="490" x2="595" y2="415" class="assoc"/>
</svg>
