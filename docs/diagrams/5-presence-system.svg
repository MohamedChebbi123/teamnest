<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="450" y="28" class="diagram-title">5. Presence System</text>

  <g>
    <circle cx="90" cy="240" r="14" class="actor-line"/>
    <line x1="90" y1="254" x2="90" y2="295" class="actor-line"/>
    <line x1="65" y1="270" x2="115" y2="270" class="actor-line"/>
    <line x1="90" y1="295" x2="65" y2="330" class="actor-line"/>
    <line x1="90" y1="295" x2="115" y2="330" class="actor-line"/>
    <text x="90" y="352" class="actor-label">Authenticated User</text>
  </g>

  <rect x="230" y="60" width="600" height="400" rx="8" class="boundary"/>
  <text x="530" y="82" class="boundary-title">Presence Service</text>

  <ellipse cx="450" cy="150" rx="155" ry="28" class="usecase"/>
  <text x="450" y="154" class="uc-label">Connect to Presence WebSocket</text>

  <ellipse cx="700" cy="260" rx="110" ry="28" class="usecase"/>
  <text x="700" y="252" class="uc-label">Set Status</text>
  <text x="700" y="270" class="stereo">(online/away/busy/offline)</text>

  <ellipse cx="450" cy="380" rx="140" ry="28" class="usecase"/>
  <text x="450" y="384" class="uc-label">View Users' Online Status</text>

  <line x1="110" y1="280" x2="305" y2="155" class="assoc"/>
  <line x1="110" y1="280" x2="595" y2="265" class="assoc"/>
  <line x1="110" y1="280" x2="320" y2="378" class="assoc"/>

  <line x1="570" y1="170" x2="640" y2="240" class="dep"/>
  <text x="640" y="200" class="stereo">«include»</text>

  <line x1="510" y1="170" x2="490" y2="352" class="dep"/>
  <text x="540" y="270" class="stereo">«include»</text>
</svg>
