<svg xmlns="http://www.w3.org/2000/svg" width="950" height="600" viewBox="0 0 950 600" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #fff3e0; stroke: #e65100; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">3. Billing &amp; Subscription (Stripe Integration)</text>

  <g>
    <circle cx="80" cy="220" r="14" class="actor-line"/>
    <line x1="80" y1="234" x2="80" y2="275" class="actor-line"/>
    <line x1="55" y1="250" x2="105" y2="250" class="actor-line"/>
    <line x1="80" y1="275" x2="55" y2="310" class="actor-line"/>
    <line x1="80" y1="275" x2="105" y2="310" class="actor-line"/>
    <text x="80" y="332" class="actor-label">Org Owner/Admin</text>
  </g>

  <g>
    <circle cx="870" cy="220" r="14" class="actor-line"/>
    <line x1="870" y1="234" x2="870" y2="275" class="actor-line"/>
    <line x1="845" y1="250" x2="895" y2="250" class="actor-line"/>
    <line x1="870" y1="275" x2="845" y2="310" class="actor-line"/>
    <line x1="870" y1="275" x2="895" y2="310" class="actor-line"/>
    <text x="870" y="332" class="actor-label">Stripe</text>
    <text x="870" y="348" class="stereo">«external»</text>
  </g>

  <rect x="220" y="60" width="600" height="500" rx="8" class="boundary"/>
  <text x="520" y="82" class="boundary-title">Billing Subsystem (Organization Service)</text>

  <ellipse cx="400" cy="150" rx="140" ry="28" class="usecase"/>
  <text x="400" y="146" class="uc-label">Subscribe to Pro Plan</text>
  <text x="400" y="162" class="stereo">(Checkout)</text>

  <ellipse cx="640" cy="150" rx="135" ry="28" class="usecase"/>
  <text x="640" y="146" class="uc-label">Confirm Upgrade</text>
  <text x="640" y="162" class="stereo">(after payment)</text>

  <ellipse cx="520" cy="320" rx="170" ry="34" class="usecase"/>
  <text x="520" y="316" class="uc-label">Handle Stripe Webhook</text>
  <text x="520" y="334" class="stereo">(renewal / cancel / payment failure)</text>

  <ellipse cx="520" cy="470" rx="135" ry="28" class="usecase"/>
  <text x="520" y="474" class="uc-label">Cancel Subscription</text>

  <line x1="100" y1="265" x2="265" y2="155" class="assoc"/>
  <line x1="100" y1="265" x2="395" y2="470" class="assoc"/>

  <line x1="850" y1="265" x2="540" y2="155" class="assoc"/>
  <line x1="850" y1="265" x2="690" y2="320" class="assoc"/>

  <line x1="540" y1="170" x2="510" y2="290" class="dep"/>
  <text x="565" y="240" class="stereo">«include»</text>

  <line x1="640" y1="178" x2="555" y2="290" class="dep"/>
  <text x="635" y="240" class="stereo">«extend»</text>

  <line x1="520" y1="442" x2="520" y2="354" class="dep"/>
  <text x="565" y="400" class="stereo">«include»</text>
</svg>
