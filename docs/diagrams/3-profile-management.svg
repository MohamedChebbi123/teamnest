<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="450" y="28" class="diagram-title">3. Profile Management</text>

  <g>
    <circle cx="90" cy="280" r="14" class="actor-line"/>
    <line x1="90" y1="294" x2="90" y2="335" class="actor-line"/>
    <line x1="65" y1="310" x2="115" y2="310" class="actor-line"/>
    <line x1="90" y1="335" x2="65" y2="370" class="actor-line"/>
    <line x1="90" y1="335" x2="115" y2="370" class="actor-line"/>
    <text x="90" y="392" class="actor-label">Authenticated User</text>
  </g>

  <rect x="220" y="60" width="630" height="500" rx="8" class="boundary"/>
  <text x="535" y="82" class="boundary-title">Auth Service</text>

  <ellipse cx="370" cy="140" rx="90" ry="26" class="usecase"/>
  <text x="370" y="144" class="uc-label">View Profile</text>

  <ellipse cx="370" cy="240" rx="100" ry="26" class="usecase"/>
  <text x="370" y="244" class="uc-label">Complete Profile</text>

  <ellipse cx="700" cy="140" rx="115" ry="26" class="usecase"/>
  <text x="700" y="144" class="uc-label">Edit Name &amp; Avatar</text>

  <ellipse cx="700" cy="240" rx="135" ry="28" class="usecase"/>
  <text x="700" y="244" class="uc-label">Update Email / Phone / Country</text>

  <ellipse cx="535" cy="380" rx="110" ry="26" class="usecase"/>
  <text x="535" y="384" class="uc-label">Change Password</text>

  <line x1="110" y1="320" x2="285" y2="148" class="assoc"/>
  <line x1="110" y1="320" x2="275" y2="240" class="assoc"/>
  <line x1="110" y1="320" x2="588" y2="148" class="assoc"/>
  <line x1="110" y1="320" x2="568" y2="240" class="assoc"/>
  <line x1="110" y1="320" x2="430" y2="378" class="assoc"/>

  <line x1="585" y1="140" x2="465" y2="140" class="dep"/>
  <text x="525" y="132" class="stereo">«extend»</text>

  <line x1="565" y1="240" x2="475" y2="240" class="dep"/>
  <text x="520" y="232" class="stereo">«extend»</text>
</svg>
