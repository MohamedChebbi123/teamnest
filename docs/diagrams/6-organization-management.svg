<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="450" y="28" class="diagram-title">1. Organization Management</text>

  <g>
    <circle cx="90" cy="220" r="14" class="actor-line"/>
    <line x1="90" y1="234" x2="90" y2="275" class="actor-line"/>
    <line x1="65" y1="250" x2="115" y2="250" class="actor-line"/>
    <line x1="90" y1="275" x2="65" y2="310" class="actor-line"/>
    <line x1="90" y1="275" x2="115" y2="310" class="actor-line"/>
    <text x="90" y="332" class="actor-label">Authenticated User</text>
  </g>

  <rect x="230" y="60" width="620" height="400" rx="8" class="boundary"/>
  <text x="540" y="82" class="boundary-title">Organization Service</text>

  <ellipse cx="400" cy="150" rx="115" ry="28" class="usecase"/>
  <text x="400" y="154" class="uc-label">Create Organization</text>

  <ellipse cx="680" cy="150" rx="115" ry="28" class="usecase"/>
  <text x="680" y="154" class="uc-label">Update Organization</text>

  <ellipse cx="400" cy="290" rx="115" ry="28" class="usecase"/>
  <text x="400" y="294" class="uc-label">Delete Organization</text>

  <ellipse cx="680" cy="290" rx="135" ry="28" class="usecase"/>
  <text x="680" y="294" class="uc-label">Fetch My Organizations</text>

  <line x1="115" y1="265" x2="295" y2="155" class="assoc"/>
  <line x1="115" y1="265" x2="565" y2="155" class="assoc"/>
  <line x1="115" y1="265" x2="295" y2="285" class="assoc"/>
  <line x1="115" y1="265" x2="545" y2="290" class="assoc"/>
</svg>
