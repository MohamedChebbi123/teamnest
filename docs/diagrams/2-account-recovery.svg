<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="450" y="28" class="diagram-title">2. Account Recovery</text>

  <g>
    <circle cx="80" cy="200" r="14" class="actor-line"/>
    <line x1="80" y1="214" x2="80" y2="255" class="actor-line"/>
    <line x1="55" y1="230" x2="105" y2="230" class="actor-line"/>
    <line x1="80" y1="255" x2="55" y2="290" class="actor-line"/>
    <line x1="80" y1="255" x2="105" y2="290" class="actor-line"/>
    <text x="80" y="312" class="actor-label">Guest</text>
  </g>

  <g>
    <circle cx="820" cy="200" r="14" class="actor-line"/>
    <line x1="820" y1="214" x2="820" y2="255" class="actor-line"/>
    <line x1="795" y1="230" x2="845" y2="230" class="actor-line"/>
    <line x1="820" y1="255" x2="795" y2="290" class="actor-line"/>
    <line x1="820" y1="255" x2="845" y2="290" class="actor-line"/>
    <text x="820" y="312" class="actor-label">Email Service</text>
    <text x="820" y="328" class="stereo">«external»</text>
  </g>

  <rect x="200" y="60" width="500" height="400" rx="8" class="boundary"/>
  <text x="450" y="82" class="boundary-title">Auth Service</text>

  <ellipse cx="450" cy="150" rx="125" ry="28" class="usecase"/>
  <text x="450" y="154" class="uc-label">Request Password Reset</text>

  <ellipse cx="450" cy="260" rx="115" ry="28" class="usecase"/>
  <text x="450" y="264" class="uc-label">Verify Reset Code</text>

  <ellipse cx="450" cy="370" rx="115" ry="28" class="usecase"/>
  <text x="450" y="374" class="uc-label">Reset Password</text>

  <line x1="100" y1="240" x2="330" y2="155" class="assoc"/>
  <line x1="100" y1="240" x2="340" y2="260" class="assoc"/>
  <line x1="100" y1="240" x2="340" y2="365" class="assoc"/>

  <line x1="800" y1="240" x2="570" y2="155" class="assoc"/>

  <line x1="450" y1="178" x2="450" y2="232" class="dep"/>
  <text x="498" y="210" class="stereo">«include»</text>

  <line x1="450" y1="288" x2="450" y2="342" class="dep"/>
  <text x="498" y="320" class="stereo">«include»</text>
</svg>
