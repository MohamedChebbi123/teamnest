<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">3. Team Channels &amp; Files</text>

  <g>
    <circle cx="80" cy="180" r="14" class="actor-line"/>
    <line x1="80" y1="194" x2="80" y2="235" class="actor-line"/>
    <line x1="55" y1="210" x2="105" y2="210" class="actor-line"/>
    <line x1="80" y1="235" x2="55" y2="270" class="actor-line"/>
    <line x1="80" y1="235" x2="105" y2="270" class="actor-line"/>
    <text x="80" y="292" class="actor-label">Org Member</text>
  </g>

  <g>
    <circle cx="80" cy="420" r="14" class="actor-line"/>
    <line x1="80" y1="434" x2="80" y2="475" class="actor-line"/>
    <line x1="55" y1="450" x2="105" y2="450" class="actor-line"/>
    <line x1="80" y1="475" x2="55" y2="510" class="actor-line"/>
    <line x1="80" y1="475" x2="105" y2="510" class="actor-line"/>
    <text x="80" y="532" class="actor-label">Team Manager</text>
  </g>

  <rect x="220" y="60" width="700" height="450" rx="8" class="boundary"/>
  <text x="570" y="82" class="boundary-title">Team Service</text>

  <ellipse cx="730" cy="150" rx="160" ry="28" class="usecase"/>
  <text x="730" y="146" class="uc-label">Create Channel</text>
  <text x="730" y="162" class="stereo">(scoped to a team)</text>

  <ellipse cx="400" cy="150" rx="135" ry="28" class="usecase"/>
  <text x="400" y="154" class="uc-label">Fetch Team Channels</text>

  <ellipse cx="400" cy="290" rx="155" ry="28" class="usecase"/>
  <text x="400" y="286" class="uc-label">Fetch Channel Files</text>
  <text x="400" y="302" class="stereo">(team channel)</text>

  <ellipse cx="730" cy="290" rx="135" ry="28" class="usecase"/>
  <text x="730" y="294" class="uc-label">View PDF Inline</text>

  <line x1="100" y1="220" x2="265" y2="155" class="assoc"/>
  <line x1="100" y1="220" x2="245" y2="290" class="assoc"/>
  <line x1="100" y1="220" x2="595" y2="290" class="assoc"/>

  <line x1="100" y1="460" x2="570" y2="155" class="assoc"/>

  <line x1="555" y1="290" x2="595" y2="290" class="dep"/>
  <text x="575" y="282" class="stereo">«extend»</text>
</svg>
