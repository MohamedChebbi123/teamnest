<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">1. Team Management</text>

  <g>
    <circle cx="80" cy="160" r="14" class="actor-line"/>
    <line x1="80" y1="174" x2="80" y2="215" class="actor-line"/>
    <line x1="55" y1="190" x2="105" y2="190" class="actor-line"/>
    <line x1="80" y1="215" x2="55" y2="250" class="actor-line"/>
    <line x1="80" y1="215" x2="105" y2="250" class="actor-line"/>
    <text x="80" y="272" class="actor-label">Org Member</text>
  </g>

  <g>
    <circle cx="80" cy="380" r="14" class="actor-line"/>
    <line x1="80" y1="394" x2="80" y2="435" class="actor-line"/>
    <line x1="55" y1="410" x2="105" y2="410" class="actor-line"/>
    <line x1="80" y1="435" x2="55" y2="470" class="actor-line"/>
    <line x1="80" y1="435" x2="105" y2="470" class="actor-line"/>
    <text x="80" y="492" class="actor-label">Org Admin</text>
  </g>

  <rect x="230" y="60" width="690" height="450" rx="8" class="boundary"/>
  <text x="575" y="82" class="boundary-title">Team Service</text>

  <ellipse cx="400" cy="140" rx="100" ry="26" class="usecase"/>
  <text x="400" y="144" class="uc-label">Create Team</text>

  <ellipse cx="650" cy="140" rx="100" ry="26" class="usecase"/>
  <text x="650" y="144" class="uc-label">Update Team</text>

  <ellipse cx="820" cy="240" rx="90" ry="26" class="usecase"/>
  <text x="820" y="244" class="uc-label">Delete Team</text>

  <ellipse cx="400" cy="270" rx="125" ry="26" class="usecase"/>
  <text x="400" y="274" class="uc-label">Fetch Teams in Org</text>

  <ellipse cx="620" cy="270" rx="115" ry="26" class="usecase"/>
  <text x="620" y="274" class="uc-label">Fetch My Teams</text>

  <line x1="100" y1="200" x2="305" y2="265" class="assoc"/>
  <line x1="100" y1="200" x2="510" y2="270" class="assoc"/>

  <line x1="100" y1="420" x2="305" y2="148" class="assoc"/>
  <line x1="100" y1="420" x2="555" y2="148" class="assoc"/>
  <line x1="100" y1="420" x2="735" y2="245" class="assoc"/>
</svg>
