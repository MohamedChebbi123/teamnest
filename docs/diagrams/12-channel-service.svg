<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">Channel Service (Org-wide Channels)</text>

  <g>
    <circle cx="80" cy="170" r="14" class="actor-line"/>
    <line x1="80" y1="184" x2="80" y2="225" class="actor-line"/>
    <line x1="55" y1="200" x2="105" y2="200" class="actor-line"/>
    <line x1="80" y1="225" x2="55" y2="260" class="actor-line"/>
    <line x1="80" y1="225" x2="105" y2="260" class="actor-line"/>
    <text x="80" y="282" class="actor-label">Org Member</text>
  </g>

  <g>
    <circle cx="80" cy="410" r="14" class="actor-line"/>
    <line x1="80" y1="424" x2="80" y2="465" class="actor-line"/>
    <line x1="55" y1="440" x2="105" y2="440" class="actor-line"/>
    <line x1="80" y1="465" x2="55" y2="500" class="actor-line"/>
    <line x1="80" y1="465" x2="105" y2="500" class="actor-line"/>
    <text x="80" y="522" class="actor-label">Channel Creator/Admin</text>
  </g>

  <rect x="230" y="60" width="690" height="450" rx="8" class="boundary"/>
  <text x="575" y="82" class="boundary-title">Channel Service</text>

  <ellipse cx="400" cy="150" rx="120" ry="26" class="usecase"/>
  <text x="400" y="154" class="uc-label">Fetch All Channels</text>

  <ellipse cx="720" cy="150" rx="140" ry="28" class="usecase"/>
  <text x="720" y="146" class="uc-label">Fetch Channel Details</text>
  <text x="720" y="162" class="stereo">(single channel)</text>

  <ellipse cx="400" cy="290" rx="115" ry="26" class="usecase"/>
  <text x="400" y="294" class="uc-label">Create Channel</text>

  <ellipse cx="720" cy="290" rx="140" ry="28" class="usecase"/>
  <text x="720" y="286" class="uc-label">Update Channel</text>
  <text x="720" y="302" class="stereo">(name, type, visibility)</text>

  <ellipse cx="560" cy="430" rx="115" ry="26" class="usecase"/>
  <text x="560" y="434" class="uc-label">Delete Channel</text>

  <line x1="100" y1="210" x2="285" y2="155" class="assoc"/>
  <line x1="100" y1="210" x2="585" y2="155" class="assoc"/>

  <line x1="100" y1="450" x2="290" y2="295" class="assoc"/>
  <line x1="100" y1="450" x2="585" y2="295" class="assoc"/>
  <line x1="100" y1="450" x2="450" y2="432" class="assoc"/>
</svg>
