<svg xmlns="http://www.w3.org/2000/svg" width="950" height="450" viewBox="0 0 950 450" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #f3e8fd; stroke: #6a1b9a; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">Assistant Service (AI Grounded on Team Docs)</text>

  <g>
    <circle cx="80" cy="200" r="14" class="actor-line"/>
    <line x1="80" y1="214" x2="80" y2="255" class="actor-line"/>
    <line x1="55" y1="230" x2="105" y2="230" class="actor-line"/>
    <line x1="80" y1="255" x2="55" y2="290" class="actor-line"/>
    <line x1="80" y1="255" x2="105" y2="290" class="actor-line"/>
    <text x="80" y="312" class="actor-label">Team Member</text>
  </g>

  <g>
    <circle cx="870" cy="200" r="14" class="actor-line"/>
    <line x1="870" y1="214" x2="870" y2="255" class="actor-line"/>
    <line x1="845" y1="230" x2="895" y2="230" class="actor-line"/>
    <line x1="870" y1="255" x2="845" y2="290" class="actor-line"/>
    <line x1="870" y1="255" x2="895" y2="290" class="actor-line"/>
    <text x="870" y="312" class="actor-label">AI / LLM Provider</text>
    <text x="870" y="328" class="stereo">«external»</text>
  </g>

  <rect x="220" y="60" width="600" height="350" rx="8" class="boundary"/>
  <text x="520" y="82" class="boundary-title">Assistant Service</text>

  <ellipse cx="450" cy="160" rx="170" ry="34" class="usecase"/>
  <text x="450" y="156" class="uc-label">Ask the Assistant</text>
  <text x="450" y="174" class="stereo">(optionally scoped to a document)</text>

  <ellipse cx="600" cy="320" rx="180" ry="34" class="usecase"/>
  <text x="600" y="316" class="uc-label">Retrieve &amp; Cite Document Hits</text>
  <text x="600" y="334" class="stereo">(answer context)</text>

  <line x1="100" y1="240" x2="285" y2="160" class="assoc"/>

  <line x1="850" y1="240" x2="620" y2="160" class="assoc"/>
  <line x1="850" y1="240" x2="775" y2="320" class="assoc"/>

  <line x1="500" y1="194" x2="555" y2="286" class="dep"/>
  <text x="565" y="240" class="stereo">«include»</text>
</svg>
