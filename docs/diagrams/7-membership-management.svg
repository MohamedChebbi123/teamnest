<svg xmlns="http://www.w3.org/2000/svg" width="950" height="650" viewBox="0 0 950 650" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .dep { stroke: #444; stroke-width: 1.2; fill: none; stroke-dasharray: 5,4; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">2. Membership Management</text>

  <g>
    <circle cx="80" cy="160" r="14" class="actor-line"/>
    <line x1="80" y1="174" x2="80" y2="215" class="actor-line"/>
    <line x1="55" y1="190" x2="105" y2="190" class="actor-line"/>
    <line x1="80" y1="215" x2="55" y2="250" class="actor-line"/>
    <line x1="80" y1="215" x2="105" y2="250" class="actor-line"/>
    <text x="80" y="272" class="actor-label">Authenticated User</text>
  </g>

  <g>
    <circle cx="80" cy="450" r="14" class="actor-line"/>
    <line x1="80" y1="464" x2="80" y2="505" class="actor-line"/>
    <line x1="55" y1="480" x2="105" y2="480" class="actor-line"/>
    <line x1="80" y1="505" x2="55" y2="540" class="actor-line"/>
    <line x1="80" y1="505" x2="105" y2="540" class="actor-line"/>
    <text x="80" y="562" class="actor-label">Org Owner/Admin</text>
  </g>

  <rect x="220" y="60" width="700" height="560" rx="8" class="boundary"/>
  <text x="570" y="82" class="boundary-title">Organization Service</text>

  <ellipse cx="400" cy="150" rx="135" ry="28" class="usecase"/>
  <text x="400" y="154" class="uc-label">Request to Join Organization</text>

  <ellipse cx="750" cy="150" rx="130" ry="28" class="usecase"/>
  <text x="750" y="146" class="uc-label">Add Member</text>
  <text x="750" y="162" class="stereo">(direct invite by admin)</text>

  <ellipse cx="400" cy="280" rx="140" ry="28" class="usecase"/>
  <text x="400" y="284" class="uc-label">View Pending Join Requests</text>

  <ellipse cx="750" cy="280" rx="120" ry="28" class="usecase"/>
  <text x="750" y="284" class="uc-label">Accept Join Request</text>

  <ellipse cx="400" cy="410" rx="120" ry="28" class="usecase"/>
  <text x="400" y="414" class="uc-label">Reject Join Request</text>

  <ellipse cx="750" cy="410" rx="140" ry="28" class="usecase"/>
  <text x="750" y="414" class="uc-label">View Organization Members</text>

  <line x1="100" y1="200" x2="270" y2="155" class="assoc"/>

  <line x1="100" y1="490" x2="625" y2="155" class="assoc"/>
  <line x1="100" y1="490" x2="265" y2="285" class="assoc"/>
  <line x1="100" y1="490" x2="635" y2="285" class="assoc"/>
  <line x1="100" y1="490" x2="285" y2="412" class="assoc"/>
  <line x1="100" y1="490" x2="615" y2="412" class="assoc"/>

  <line x1="540" y1="280" x2="630" y2="280" class="dep"/>
  <text x="585" y="272" class="stereo">«include»</text>

  <line x1="540" y1="280" x2="635" y2="395" class="dep"/>
  <text x="610" y="345" class="stereo">«extend»</text>
</svg>
