<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">3. Pins &amp; Voice</text>

  <g>
    <circle cx="80" cy="270" r="14" class="actor-line"/>
    <line x1="80" y1="284" x2="80" y2="325" class="actor-line"/>
    <line x1="55" y1="300" x2="105" y2="300" class="actor-line"/>
    <line x1="80" y1="325" x2="55" y2="360" class="actor-line"/>
    <line x1="80" y1="325" x2="105" y2="360" class="actor-line"/>
    <text x="80" y="382" class="actor-label">Channel Member</text>
  </g>

  <rect x="220" y="60" width="700" height="450" rx="8" class="boundary"/>
  <text x="570" y="82" class="boundary-title">Message Service</text>

  <ellipse cx="400" cy="150" rx="115" ry="26" class="usecase"/>
  <text x="400" y="154" class="uc-label">Pin Message</text>

  <ellipse cx="730" cy="150" rx="115" ry="26" class="usecase"/>
  <text x="730" y="154" class="uc-label">Unpin Message</text>

  <ellipse cx="565" cy="270" rx="155" ry="28" class="usecase"/>
  <text x="565" y="274" class="uc-label">Fetch Pinned Messages</text>

  <ellipse cx="400" cy="400" rx="135" ry="28" class="usecase"/>
  <text x="400" y="404" class="uc-label">Join Voice Channel</text>

  <ellipse cx="730" cy="400" rx="155" ry="28" class="usecase"/>
  <text x="730" y="404" class="uc-label">Fetch Voice Participants</text>

  <line x1="100" y1="310" x2="295" y2="155" class="assoc"/>
  <line x1="100" y1="310" x2="615" y2="155" class="assoc"/>
  <line x1="100" y1="310" x2="415" y2="270" class="assoc"/>
  <line x1="100" y1="310" x2="275" y2="400" class="assoc"/>
  <line x1="100" y1="310" x2="580" y2="400" class="assoc"/>
</svg>
