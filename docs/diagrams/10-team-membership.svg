<svg xmlns="http://www.w3.org/2000/svg" width="950" height="600" viewBox="0 0 950 600" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">2. Team Membership</text>

  <g>
    <circle cx="80" cy="200" r="14" class="actor-line"/>
    <line x1="80" y1="214" x2="80" y2="255" class="actor-line"/>
    <line x1="55" y1="230" x2="105" y2="230" class="actor-line"/>
    <line x1="80" y1="255" x2="55" y2="290" class="actor-line"/>
    <line x1="80" y1="255" x2="105" y2="290" class="actor-line"/>
    <text x="80" y="312" class="actor-label">Org Member</text>
  </g>

  <g>
    <circle cx="80" cy="450" r="14" class="actor-line"/>
    <line x1="80" y1="464" x2="80" y2="505" class="actor-line"/>
    <line x1="55" y1="480" x2="105" y2="480" class="actor-line"/>
    <line x1="80" y1="505" x2="55" y2="540" class="actor-line"/>
    <line x1="80" y1="505" x2="105" y2="540" class="actor-line"/>
    <text x="80" y="562" class="actor-label">Team Manager</text>
  </g>

  <rect x="220" y="60" width="700" height="510" rx="8" class="boundary"/>
  <text x="570" y="82" class="boundary-title">Team Service</text>

  <ellipse cx="400" cy="150" rx="125" ry="26" class="usecase"/>
  <text x="400" y="154" class="uc-label">View Team Members</text>

  <ellipse cx="730" cy="150" rx="155" ry="28" class="usecase"/>
  <text x="730" y="154" class="uc-label">View Specific Member Info</text>

  <ellipse cx="400" cy="280" rx="135" ry="26" class="usecase"/>
  <text x="400" y="284" class="uc-label">Add Members to Team</text>

  <ellipse cx="730" cy="280" rx="155" ry="28" class="usecase"/>
  <text x="730" y="284" class="uc-label">Kick Member from Team</text>

  <ellipse cx="400" cy="430" rx="155" ry="28" class="usecase"/>
  <text x="400" y="426" class="uc-label">Update Member Permissions</text>
  <text x="400" y="442" class="stereo">(assign role)</text>

  <ellipse cx="730" cy="430" rx="155" ry="28" class="usecase"/>
  <text x="730" y="434" class="uc-label">Revoke Permissions</text>

  <line x1="100" y1="240" x2="280" y2="155" class="assoc"/>
  <line x1="100" y1="240" x2="580" y2="155" class="assoc"/>

  <line x1="100" y1="490" x2="270" y2="285" class="assoc"/>
  <line x1="100" y1="490" x2="580" y2="285" class="assoc"/>
  <line x1="100" y1="490" x2="250" y2="430" class="assoc"/>
  <line x1="100" y1="490" x2="580" y2="430" class="assoc"/>
</svg>
