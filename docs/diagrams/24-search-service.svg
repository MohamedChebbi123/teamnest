<svg xmlns="http://www.w3.org/2000/svg" width="950" height="400" viewBox="0 0 950 400" font-family="Arial, sans-serif">
  <style>
    .actor-line { stroke: #222; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; text-anchor: middle; fill: #222; }
    .boundary { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .boundary-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #222; }
    .usecase { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.5; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: #111; }
    .assoc { stroke: #444; stroke-width: 1.2; fill: none; }
    .stereo { font-size: 10px; fill: #555; text-anchor: middle; font-style: italic; }
    .diagram-title { font-size: 18px; font-weight: bold; text-anchor: middle; fill: #111; }
  </style>

  <text x="475" y="28" class="diagram-title">Search Service (Cross-Org Global Search)</text>

  <g>
    <circle cx="80" cy="180" r="14" class="actor-line"/>
    <line x1="80" y1="194" x2="80" y2="235" class="actor-line"/>
    <line x1="55" y1="210" x2="105" y2="210" class="actor-line"/>
    <line x1="80" y1="235" x2="55" y2="270" class="actor-line"/>
    <line x1="80" y1="235" x2="105" y2="270" class="actor-line"/>
    <text x="80" y="292" class="actor-label">Authenticated User</text>
  </g>

  <g>
    <circle cx="870" cy="180" r="14" class="actor-line"/>
    <line x1="870" y1="194" x2="870" y2="235" class="actor-line"/>
    <line x1="845" y1="210" x2="895" y2="210" class="actor-line"/>
    <line x1="870" y1="235" x2="845" y2="270" class="actor-line"/>
    <line x1="870" y1="235" x2="895" y2="270" class="actor-line"/>
    <text x="870" y="292" class="actor-label">Search Engine</text>
    <text x="870" y="308" class="stereo">«external»</text>
  </g>

  <rect x="220" y="70" width="600" height="280" rx="8" class="boundary"/>
  <text x="520" y="92" class="boundary-title">Search Service</text>

  <ellipse cx="520" cy="220" rx="200" ry="40" class="usecase"/>
  <text x="520" y="214" class="uc-label">Global Search</text>
  <text x="520" y="234" class="stereo">(messages / files / users / channels)</text>

  <line x1="100" y1="220" x2="320" y2="220" class="assoc"/>
  <line x1="850" y1="220" x2="720" y2="220" class="assoc"/>
</svg>
